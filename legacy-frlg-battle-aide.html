<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FireRed & LeafGreen Battle Aide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0c14; --card:#13141f; --card2:#1a1b2a; --border:#252638; --border2:#32334a;
  --red:#ff3d5a; --gold:#ffc93c; --green:#3ddc84; --blue:#4dabf7;
  --gold-dim:rgba(255,201,60,.12); --green-dim:rgba(61,220,132,.1); --blue-dim:rgba(77,171,247,.1);
  --text:#e8e9f3; --text2:#9899b8; --text3:#4a4b6a;
  --r:10px; --r2:14px;
  --fp:'Press Start 2P',monospace; --fb:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.016) 1px,transparent 1px);
  background-size:24px 24px;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;z-index:1;}

/* ── MASTHEAD ── */
.masthead{flex-shrink:0;background:linear-gradient(160deg,#1c0a14 0%,#18102a 60%,#0e0e1e 100%);
border-bottom:1px solid rgba(255,61,90,.22);padding:10px 16px 9px;position:relative;overflow:hidden;}
.masthead::after{content:’’;position:absolute;inset:0;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);}
.mast-inner{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;}
.mast-title{font-family:var(–fp);font-size:8px;color:var(–gold);letter-spacing:.5px;line-height:1.6;
text-shadow:0 0 20px rgba(255,201,60,.4),0 0 40px rgba(255,201,60,.12);}
.mast-sub{font-family:var(–fp);font-size:5px;color:var(–text3);margin-top:3px;letter-spacing:.3px;}
.mast-logo{font-size:24px;opacity:.1;}

/* ── NAV ── */
.nav{display:flex;background:var(–card);border-bottom:1px solid var(–border);flex-shrink:0;gap:4px;padding:6px 8px 0;}
.nb{flex:1;padding:8px 4px 7px;text-align:center;cursor:pointer;border:none;background:none;
color:var(–text3);font-family:var(–fp);font-size:5px;line-height:1.9;
border-radius:7px 7px 0 0;border-bottom:2px solid transparent;transition:all .18s;}
.nb .ni{font-size:14px;display:block;margin-bottom:2px;}
.nb.active{color:var(–gold);background:var(–gold-dim);border-bottom-color:var(–gold);}

/* ── PAGES ── */
.page{display:none;flex-direction:column;flex:1;overflow:hidden;}
.page.active{display:flex;}
.scroll{flex:1;overflow-y:auto;padding:11px 14px 28px;}

/* ── SHARED INPUT ── */
.si{width:100%;background:var(–card2);border:1.5px solid var(–border2);border-radius:9px;
padding:10px 36px 10px 14px;color:var(–text);font-family:var(–fb);font-size:17px;
font-weight:500;outline:none;transition:border-color .2s,box-shadow .2s;}
.si::placeholder{color:var(–text3);}
.si:focus{border-color:var(–gold);box-shadow:0 0 0 3px var(–gold-dim);}
.si.gf:focus{border-color:var(–green);box-shadow:0 0 0 3px var(–green-dim);}
.sbox{position:relative;}
.xcl{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;
color:var(–text3);font-size:16px;cursor:pointer;display:none;line-height:1;padding:3px;}

/* ── TYPE BADGES ── */
.tb{padding:3px 7px;border-radius:5px;font-family:var(–fp);font-size:6px;display:inline-block;line-height:1.5;}
.tb.sm{padding:2px 6px;font-size:5.5px;}
.t-Normal{background:#6a6a5a;color:#fff;} .t-Fire{background:#b84018;color:#fff;}
.t-Water{background:#2850c0;color:#fff;} .t-Grass{background:#3a8820;color:#fff;}
.t-Electric{background:#b89800;color:#fff;} .t-Ice{background:#488888;color:#fff;}
.t-Fighting{background:#801818;color:#fff;} .t-Poison{background:#621880;color:#fff;}
.t-Ground{background:#907030;color:#fff;} .t-Flying{background:#5848c0;color:#fff;}
.t-Psychic{background:#b02050;color:#fff;} .t-Bug{background:#607210;color:#fff;}
.t-Rock{background:#786820;color:#fff;} .t-Ghost{background:#402860;color:#fff;}
.t-Dragon{background:#3808d8;color:#fff;} .t-Dark{background:#382818;color:#fff;}
.t-Steel{background:#686880;color:#fff;} .t-Fairy{background:#a03860;color:#fff;}

/* ══════════════════════════════════
SEARCH PAGE
══════════════════════════════════ */
.search-ph{flex-shrink:0;background:linear-gradient(160deg,#1a0812 0%,#1a102a 100%);
padding:11px 14px 0;border-bottom:1px solid var(–border);}
.search-ph-top{padding-bottom:10px;}
.ph-title{font-family:var(–fp);font-size:8px;color:var(–red);
text-shadow:0 0 18px rgba(255,61,90,.35);margin-bottom:9px;letter-spacing:.5px;}

/* Type filter pills */
.type-filter-row{display:flex;gap:4px;padding:8px 14px 7px;overflow-x:auto;flex-shrink:0;
scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.type-filter-row::-webkit-scrollbar{display:none;}
.tpill{padding:5px 9px;border-radius:20px;font-family:var(–fp);font-size:5.5px;
cursor:pointer;border:1.5px solid transparent;opacity:.45;transition:all .15s;
white-space:nowrap;line-height:1.5;flex-shrink:0;}
.tpill:active{transform:scale(.93);}
.tpill.active{opacity:1;border-color:rgba(255,255,255,.55);box-shadow:0 0 8px rgba(255,255,255,.1);}

/* Dropdown */
.pdrop{background:var(–card2);border:1.5px solid var(–border2);border-top:none;
border-radius:0 0 var(–r) var(–r);overflow-y:auto;max-height:170px;
margin:0 14px;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.prow{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;
border-bottom:1px solid var(–border);transition:background .1s;}
.prow:last-child{border-bottom:none;}
.prow:active{background:var(–gold-dim);}
.pnum{color:var(–text3);font-size:11px;min-width:30px;}
.pname{flex:1;font-size:16px;font-weight:500;}
.pbadges{display:flex;gap:3px;flex-shrink:0;}

/* Default state: recents + type browse results */
.section-label{font-family:var(–fp);font-size:5.5px;color:var(–text3);
margin-bottom:7px;letter-spacing:.3px;display:flex;align-items:center;gap:7px;}
.section-label::after{content:’’;flex:1;height:1px;background:var(–border);}

.recent-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.rchip{padding:5px 10px;background:var(–card2);border:1px solid var(–border2);
border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
color:var(–text2);transition:all .14s;}
.rchip:active{background:var(–gold-dim);color:var(–gold);border-color:rgba(255,201,60,.3);}

/* Type browse results — compact list cards */
.browse-card{background:var(–card);border:1px solid var(–border);border-radius:var(–r2);
padding:9px 12px;margin-bottom:7px;cursor:pointer;transition:all .13s;
display:flex;align-items:center;gap:10px;}
.browse-card:active{background:var(–card2);border-color:var(–border2);}
.bc-left{flex:1;min-width:0;}
.bc-name{font-size:15px;font-weight:500;margin-bottom:3px;}
.bc-num{font-size:10px;color:var(–text3);}
.bc-badges{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0;}
.bc-obtain{font-size:11px;color:var(–text3);margin-top:3px;line-height:1.5;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── POKEMON DETAIL (selected state) ── */
/* Header card */
.poke-card{background:linear-gradient(135deg,rgba(255,61,90,.07),rgba(72,8,216,.05));
border:1.5px solid rgba(255,61,90,.2);border-radius:var(–r2);
padding:13px 14px;margin-bottom:13px;}
.poke-card-row{display:flex;align-items:flex-start;justify-content:space-between;}
.pc-num{font-size:11px;color:var(–text3);margin-bottom:3px;}
.pc-name{font-family:var(–fp);font-size:10px;color:var(–text);margin-bottom:6px;line-height:1.5;}
.pc-types{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.pc-dim{font-size:32px;opacity:.09;}

/* Obtain section */
.obtain-section{background:var(–card2);border:1px solid var(–border2);border-radius:8px;padding:9px 11px;}
.obtain-label{font-family:var(–fp);font-size:5.5px;color:var(–green);margin-bottom:6px;letter-spacing:.3px;}
.obtain-row{font-size:12px;color:var(–text2);line-height:1.7;}
.obtain-row.unavail{color:var(–text3);font-style:italic;}
.obtain-method{display:inline-block;background:rgba(61,220,132,.1);color:var(–green);
border-radius:3px;padding:1px 5px;font-size:10px;margin-right:4px;font-family:var(–fp);font-size:5px;}

/* Section head */
.sec-head{font-family:var(–fp);font-size:6px;color:var(–text3);
margin:13px 0 8px;display:flex;align-items:center;gap:7px;line-height:1.5;}
.sec-head::after{content:’’;flex:1;height:1px;background:var(–border);}

/* Party suggestion cards */
.scard{background:var(–card);border:1px solid var(–border);border-radius:var(–r2);
padding:11px 12px;margin-bottom:7px;}
.scard.top{border-color:rgba(61,220,132,.3);background:linear-gradient(135deg,rgba(61,220,132,.04),var(–card));}
.scard.risky{border-color:rgba(255,61,90,.25);}
.sc-r1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.sc-name{font-family:var(–fp);font-size:7.5px;color:var(–text);line-height:1.6;}
.sc-lv{font-size:11px;color:var(–text3);margin-left:5px;}
.sc-badge{font-family:var(–fp);font-size:6px;padding:3px 7px;border-radius:5px;flex-shrink:0;margin-left:6px;}
.bn{background:rgba(0,220,100,.18);color:#00dc64;}
.bg{background:rgba(61,220,132,.14);color:var(–green);}
.bgo{background:rgba(77,171,247,.13);color:var(–blue);}
.bo{background:rgba(255,152,0,.12);color:#ff9800;}
.bb{background:rgba(255,61,90,.12);color:var(–red);}
.sc-types{display:flex;gap:3px;margin-bottom:5px;}
.sc-moves{display:flex;flex-direction:column;gap:4px;}
.sc-mr{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;}
.sc-tags{display:flex;gap:3px;flex-wrap:wrap;}
.mtag{font-family:var(–fp);font-size:5px;padding:2px 5px;border-radius:3px;}
.m4x{background:rgba(0,220,100,.2);color:#00dc64;}
.m2x{background:rgba(61,220,132,.16);color:var(–green);}
.m0x{background:rgba(255,61,90,.16);color:var(–red);}
.mstab{background:var(–gold-dim);color:var(–gold);}
.mphy{background:rgba(180,120,0,.1);color:#907030;}
.mspe{background:rgba(77,171,247,.1);color:#5080b8;}
.sc-hint{font-size:12px;color:var(–text3);margin-top:3px;line-height:1.5;}
.sc-warn{font-family:var(–fp);font-size:5px;color:#ff7070;margin-top:5px;line-height:1.7;}
.sc-imm{font-family:var(–fp);font-size:5px;color:var(–green);margin-top:4px;line-height:1.7;}

.no-party{background:var(–card);border:1px dashed var(–border2);border-radius:var(–r2);
padding:15px;text-align:center;margin-bottom:12px;}
.np-txt{font-family:var(–fp);font-size:6px;color:var(–text3);line-height:2.2;margin-bottom:10px;}
.go-btn{padding:9px 14px;background:var(–blue-dim);border:1px solid rgba(77,171,247,.22);
border-radius:7px;color:var(–blue);font-family:var(–fp);font-size:6px;cursor:pointer;}
.go-btn:active{background:rgba(77,171,247,.18);}

/* Type chart */
.rcrow{background:var(–card);border:1px solid var(–border);border-radius:var(–r);margin-bottom:6px;overflow:hidden;}
.rch{padding:7px 11px;font-family:var(–fp);font-size:6px;display:flex;align-items:center;gap:5px;line-height:1.5;}
.rch.x4{background:rgba(0,220,100,.1);color:#00dc64;border-bottom:1px solid rgba(0,220,100,.13);}
.rch.x2{background:rgba(61,220,132,.08);color:var(–green);border-bottom:1px solid rgba(61,220,132,.11);}
.rch.x0{background:rgba(255,61,90,.08);color:#ff7070;border-bottom:1px solid rgba(255,61,90,.11);}
.rch.xh{background:rgba(255,152,0,.06);color:#b07000;border-bottom:1px solid rgba(255,152,0,.09);}
.rch.xq{background:rgba(180,80,20,.07);color:#a05020;border-bottom:1px solid rgba(180,80,20,.1);}
.rcbody{display:flex;flex-wrap:wrap;gap:5px;padding:8px 11px;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
height:100%;color:var(–text3);gap:10px;padding-bottom:30px;}
.empty .ei{font-size:40px;opacity:.25;}
.empty p{font-family:var(–fp);font-size:6.5px;line-height:2.2;text-align:center;}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.scard,.browse-card{animation:fadeUp .13s ease both;}
.scard:nth-child(2),.browse-card:nth-child(2){animation-delay:.03s;}
.scard:nth-child(3),.browse-card:nth-child(3){animation-delay:.06s;}
.scard:nth-child(4),.browse-card:nth-child(4){animation-delay:.09s;}
.scard:nth-child(5),.browse-card:nth-child(5){animation-delay:.12s;}
.scard:nth-child(6),.browse-card:nth-child(6){animation-delay:.15s;}

/* ══════════════════════════════════
PARTY PAGE
══════════════════════════════════ */
.party-ph{flex-shrink:0;background:linear-gradient(160deg,#0a1520,#0e1228);
padding:11px 14px 10px;border-bottom:1px solid var(–border);}
.party-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:11px 14px 4px;flex-shrink:0;}
.pslot{background:var(–card);border:1.5px solid var(–border);border-radius:var(–r2);
padding:10px;cursor:pointer;min-height:86px;display:flex;flex-direction:column;gap:3px;transition:opacity .14s;}
.pslot:active{opacity:.7;}
.pslot.filled{border-color:rgba(77,171,247,.22);}
.pslot.empty-s{border-style:dashed;align-items:center;justify-content:center;}
.ps-icon{font-size:20px;color:var(–text3);}
.ps-add{font-family:var(–fp);font-size:5px;color:var(–text3);margin-top:3px;}
.ps-num{font-size:10px;color:var(–text3);}
.ps-head{display:flex;align-items:baseline;gap:5px;}
.ps-name{font-family:var(–fp);font-size:6.5px;color:var(–text);line-height:1.6;}
.ps-lv{font-size:10px;color:var(–text3);}
.ps-types{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
.ps-moves{margin-top:4px;display:flex;flex-direction:column;gap:2px;}
.ps-mv{font-size:10px;color:var(–text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Coverage */
.coverage-wrap{padding:7px 14px 3px;flex-shrink:0;}
.cov-label{font-family:var(–fp);font-size:5.5px;color:var(–text3);margin-bottom:5px;}
.cov-bar{display:flex;flex-wrap:wrap;gap:3px;}
.cdot{padding:2px 6px;border-radius:4px;font-family:var(–fp);font-size:5px;line-height:1.4;
opacity:.3;transition:opacity .2s;}
.cdot.covered{opacity:1;}
.cdot.gap{opacity:.65;border:1px solid rgba(255,61,90,.3);background:rgba(255,61,90,.07)!important;color:#ff7070!important;}

/* ══════════════════════════════════
MODAL
══════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;
align-items:flex-end;backdrop-filter:blur(2px);}
.overlay.open{display:flex;}
.modal{background:var(–card);border-radius:18px 18px 0 0;border-top:1.5px solid var(–border2);
width:100%;max-width:480px;margin:0 auto;max-height:92dvh;display:flex;flex-direction:column;
animation:slideUp .2s ease;box-shadow:0 -20px 60px rgba(0,0,0,.5);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-hd{padding:13px 15px 10px;border-bottom:1px solid var(–border);flex-shrink:0;
display:flex;align-items:center;justify-content:space-between;}
.modal-ttl{font-family:var(–fp);font-size:7.5px;color:var(–gold);line-height:1.5;}
.modal-x{background:none;border:1px solid var(–border2);color:var(–text3);padding:5px 10px;
border-radius:6px;font-family:var(–fp);font-size:5.5px;cursor:pointer;}
.modal-x:active{background:var(–card2);}
.modal-body{overflow-y:auto;padding:12px 15px 28px;flex:1;}
.mlbl{font-family:var(–fp);font-size:6px;color:var(–text3);margin:11px 0 6px;line-height:1.7;}
.field-lbl{font-family:var(–fp);font-size:5.5px;color:var(–text3);margin-bottom:5px;line-height:1.5;}
.field-in{width:100%;background:var(–card2);border:1.5px solid var(–border2);border-radius:7px;
padding:8px 10px;color:var(–text);font-family:var(–fb);font-size:14px;font-weight:500;
outline:none;transition:border-color .2s;}
.field-in:focus{border-color:var(–gold);}
.field-in::placeholder{color:var(–text3);}
.sdots{display:flex;gap:6px;margin-bottom:10px;}
.sdot{width:12px;height:12px;border-radius:50%;background:var(–border);border:2px solid var(–border2);transition:all .2s;}
.sdot.on{border-color:var(–gold);}
.sdot.on.t-Fire{background:#b84018;}.sdot.on.t-Water{background:#2850c0;}.sdot.on.t-Grass{background:#3a8820;}
.sdot.on.t-Electric{background:#b89800;}.sdot.on.t-Ice{background:#488888;}.sdot.on.t-Fighting{background:#801818;}
.sdot.on.t-Poison{background:#621880;}.sdot.on.t-Ground{background:#907030;}.sdot.on.t-Flying{background:#5848c0;}
.sdot.on.t-Psychic{background:#b02050;}.sdot.on.t-Bug{background:#607210;}.sdot.on.t-Rock{background:#786820;}
.sdot.on.t-Ghost{background:#402860;}.sdot.on.t-Dragon{background:#3808d8;}.sdot.on.t-Normal{background:#6a6a5a;}
.sdot.on.t-Dark{background:#382818;}.sdot.on.t-Steel{background:#686880;}.sdot.on.t-Fairy{background:#a03860;}
.pmrow{display:flex;align-items:center;gap:7px;margin-bottom:5px;background:var(–card2);border-radius:8px;padding:7px 10px;}
.pm-name{flex:1;font-size:14px;font-weight:500;}
.pm-stat{font-family:var(–fp);font-size:5px;}
.pm-rm{background:none;border:none;color:var(–text3);font-size:15px;cursor:pointer;padding:0 2px;line-height:1;}
.pm-rm:active{color:var(–red);}
.move-si{width:100%;background:var(–card2);border:1.5px solid var(–border2);border-radius:8px;
padding:8px 12px;color:var(–text);font-family:var(–fb);font-size:15px;font-weight:500;
outline:none;transition:border-color .2s;}
.move-si:focus{border-color:var(–gold);}
.move-si::placeholder{color:var(–text3);}
.tf-row{display:flex;flex-wrap:wrap;gap:3px;margin:7px 0 6px;}
.tf{padding:3px 7px;border-radius:5px;font-family:var(–fp);font-size:5px;cursor:pointer;
border:1.5px solid transparent;opacity:.4;transition:all .12s;line-height:1.4;}
.tf.active{opacity:1;border-color:rgba(255,255,255,.5);box-shadow:0 0 7px rgba(255,255,255,.1);}
.tf:active{transform:scale(.93);}
.move-results{max-height:240px;overflow-y:auto;border:1px solid var(–border);border-radius:var(–r);background:var(–card);}
.mres-row{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;
border-bottom:1px solid var(–border);transition:background .1s;}
.mres-row:last-child{border-bottom:none;}
.mres-row:active{background:var(–gold-dim);}
.mres-row.picked{background:rgba(61,220,132,.04);}
.mres-name{flex:1;font-size:14px;font-weight:500;}
.mres-tags{display:flex;gap:4px;align-items:center;}
.mres-cat{font-family:var(–fp);font-size:4.5px;padding:2px 5px;border-radius:3px;}
.mres-phy{background:rgba(180,120,0,.12);color:#907030;}
.mres-spe{background:rgba(77,171,247,.12);color:#5080b8;}
.mres-sta{background:rgba(150,150,150,.1);color:#777;}
.mres-chk{color:var(–green);font-size:13px;}
.no-moves{padding:14px;text-align:center;color:var(–text3);font-size:13px;}
.save-btn{width:100%;padding:13px;background:rgba(77,171,247,.13);border:1.5px solid rgba(77,171,247,.28);
border-radius:9px;color:var(–blue);font-family:var(–fp);font-size:7px;cursor:pointer;margin-top:14px;}
.save-btn:disabled{opacity:.3;cursor:default;}
.save-btn:not(:disabled):active{background:rgba(77,171,247,.22);}

.gym-poke:active{background:var(–gold-dim);}
.gym-poke-name{flex:1;font-size:14px;font-weight:500;}
.gym-poke-lv{font-size:11px;color:var(–text3);min-width:36px;}
.gym-tip{font-family:var(–fp);font-size:5.5px;color:var(–text3);line-height:1.8;

══════════════════════════════════ */
.loc-ph{flex-shrink:0;background:linear-gradient(160deg,#0a1a0d,#0e1228);

function addRecent(p){
  recents=recents.filter(r=>r.n!==p.n);

}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  ['search','party','gyms','location'].forEach((p,i)=>{
    if(p===id)document.querySelectorAll('.nb')[i].classList.add('active');
  });
  if(id==='party')renderParty();
}

// Build type filter pills
function buildTypePills(){
  const row=document.getElementById('type-filter-row');
  row.innerHTML=TYPES.map(t=>`<div class="tpill t-${t}${activeTypeFilter===t?' active':''}" onclick="setTypeFilter('${t}')">${t}</div>`).join('');
}

function setTypeFilter(t){
  if(activeTypeFilter===t){
    activeTypeFilter=null;
  } else {
    activeTypeFilter=t;
    activePoke=null;
    document.getElementById('s-in').value='';
    document.getElementById('s-cl').style.display='none';
    document.getElementById('s-drop').style.display='none';
  }
  buildTypePills();
  renderSearchDefault();
}

function onSearch(v){
  document.getElementById('s-cl').style.display=v?'block':'none';
  if(!v.trim()){
    document.getElementById('s-drop').style.display='none';
    if(!activePoke)renderSearchDefault();
    return;
  }
  const q=v.toLowerCase();
  const list=POKEMON.filter(p=>p.name.toLowerCase().includes(q)).slice(0,10);
  renderPDrop('s-drop',list,'pickPoke');
}

function clearSearch(){
  document.getElementById('s-in').value='';
  document.getElementById('s-cl').style.display='none';
  document.getElementById('s-drop').style.display='none';
  activePoke=null;
  renderSearchDefault();
}

function pickPoke(n){
  activePoke=POKEMON.find(p=>p.n===n);
  document.getElementById('s-in').value=activePoke.name;
  document.getElementById('s-cl').style.display='block';
  document.getElementById('s-drop').style.display='none';
  activeTypeFilter=null;
  buildTypePills();
  addRecent(activePoke);
  renderPokeDetail();
}

// Default search state: recents + type browse
function renderSearchDefault(){
  const scroll=document.getElementById('s-scroll');
  let html='';

  // Recents
  if(recents.length){
    html+=`<div class="section-label">RECENT</div>
    <div class="recent-chips">${recents.map(r=>`<div class="rchip" onclick="pickPoke(${r.n})">${r.name}</div>`).join('')}</div>`;
  }

  // Type filter active → show all pokemon of that type with obtain info
  if(activeTypeFilter){
    const filtered=POKEMON.filter(p=>p.types.includes(activeTypeFilter));
    html+=`<div class="section-label">${activeTypeFilter.toUpperCase()} TYPE (${filtered.length})</div>`;
    filtered.forEach(p=>{
      const obtain=getObtain(p.n);
      const shortObtain=obtain[0].length>42?obtain[0].slice(0,42)+'…':obtain[0];
      html+=`<div class="browse-card" onclick="pickPoke(${p.n})">
        <div class="bc-left">
          <div class="bc-name">${p.name}</div>
          <div class="bc-obtain">${shortObtain}</div>
        </div>
        <div class="bc-badges">${p.types.map(t=>`<span class="tb sm t-${t}">${t}</span>`).join('')}</div>
      </div>`;
    });
  } else if(!recents.length){
    html+=`<div class="empty"><div class="ei">🔍</div><p>SEARCH BY NAME ABOVE<br>OR TAP A TYPE TO BROWSE</p></div>`;
  } else {
    html+=`<div style="font-family:var(--fp);font-size:5.5px;color:var(--text3);line-height:2;text-align:center;margin-top:8px;">TAP A TYPE PILL TO BROWSE ALL POKEMON OF THAT TYPE</div>`;
  }

  scroll.innerHTML=html;
}

// Full pokemon detail view
function renderPokeDetail(){
  if(!activePoke)return;
  const p=activePoke;
  const et=p.types;
  const scroll=document.getElementById('s-scroll');

  // Header card with obtain
  const obtain=getObtain(p.n);
  const obtainHtml=obtain.map(o=>`<div class="obtain-row">${o}</div>`).join('');
  let html=`<div class="poke-card">
    <div class="poke-card-row">
      <div>
        <div class="pc-num">#${String(p.n).padStart(3,'0')}</div>
        <div class="pc-name">${p.name}</div>
        <div class="pc-types">${et.map(t=>`<span class="tb t-${t}">${t}</span>`).join('')}</div>
      </div>
      <div class="pc-dim">📖</div>
    </div>
    <div class="obtain-section">
      <div class="obtain-label">HOW TO OBTAIN</div>
      ${obtainHtml}
    </div>
  </div>`;

  // Party suggestions
  html+=`<div class="sec-head">MY PARTY — WHO TO USE</div>`;
  if(!party.length){
    html+=`<div class="no-party"><div class="np-txt">ADD POKEMON TO PARTY<br>FOR BATTLE SUGGESTIONS</div><button class="go-btn" onclick="showPage('party')">GO TO MY PARTY ›</button></div>`;
  } else {
    const scored=party.map(pm=>{
      let bestOff=0,bestAtkType=null;
      pm.types.forEach(at=>{const m=dmult(at,et)*1.5;if(m>bestOff){bestOff=m;bestAtkType=at;}});
      let sm=[];
      if(pm.moves&&pm.moves.length){
        pm.moves.forEach(mv=>{const raw=dmult(mv.type,et);const stab=pm.types.includes(mv.type);sm.push({...mv,raw,stab,eff:raw*(stab?1.5:1)});});
        sm.sort((a,b)=>b.eff-a.eff);bestOff=sm[0].eff;
      }
      const defRisk=Math.max(...et.map(at=>dmult(at,pm.types)));
      return{pm,bestOff,bestAtkType,sm,defRisk,score:bestOff*3-defRisk};
    }).sort((a,b)=>b.score-a.score);

    scored.forEach((s,i)=>{
      const pm=s.pm;const isTop=i===0;
      const tBadges=pm.types.map(t=>`<span class="tb sm t-${t}">${t}</span>`).join('');
      let bc='bo',bt='~ OK';
      if(s.bestOff>=6){bc='bn';bt='💥 NUKE';}
      else if(s.bestOff>=3){bc='bg';bt='⭐ GREAT';}
      else if(s.bestOff>=2){bc='bgo';bt='✅ GOOD';}
      else if(s.bestOff<1){bc='bb';bt='✗ WEAK';}

      let movesHtml='';
      if(s.sm.length){
        movesHtml='<div class="sc-moves">';
        s.sm.forEach(mv=>{
          const phys=PHYS.has(mv.type);
          let tags='';
          if(mv.raw>=4)tags+=`<span class="mtag m4x">4×</span>`;
          else if(mv.raw>=2)tags+=`<span class="mtag m2x">2×</span>`;
          else if(mv.raw===0)tags+=`<span class="mtag m0x">0×</span>`;
          if(mv.stab)tags+=`<span class="mtag mstab">STAB</span>`;
          tags+=`<span class="mtag ${phys?'mphy':'mspe'}">${phys?'PHY':'SPE'}</span>`;
          movesHtml+=`<div class="sc-mr"><span class="tb sm t-${mv.type}">${mv.type}</span><span style="flex:1">${mv.name}</span><span class="sc-tags">${tags}</span></div>`;
        });
        movesHtml+='</div>';
      } else if(s.bestAtkType){
        const raw=dmult(s.bestAtkType,et);
        movesHtml=`<div class="sc-hint">Best type: <span class="tb sm t-${s.bestAtkType}">${s.bestAtkType}</span>${raw>=2?` <span class="mtag m2x" style="display:inline-block">${raw}×</span>`:''} · <span style="color:var(--text3);font-size:11px">add moves for full breakdown</span></div>`;
      }

      let extra='';
      if(s.defRisk>=4)extra+=`<div class="sc-warn">⚠️ ENEMY HITS YOU 4× — HIGH RISK</div>`;
      else if(s.defRisk>=2)extra+=`<div class="sc-warn">⚠️ Weak to this enemy (${s.defRisk}×)</div>`;
      const imm=et.filter(at=>dmult(at,pm.types)===0);
      if(imm.length)extra+=`<div class="sc-imm">🛡 IMMUNE to ${imm.map(t=>`<span class="tb sm t-${t}">${t}</span>`).join(' ')}</div>`;

      const lvTxt=pm.level?` <span class="sc-lv">Lv.${pm.level}</span>`:'';
      html+=`<div class="scard${isTop?' top':''}${s.defRisk>=4?' risky':''}">
        <div class="sc-r1">
          <div><div style="display:flex;align-items:baseline;gap:4px;"><span class="sc-name">${isTop?'⭐ ':''}${pm.name}</span>${lvTxt}</div>
          <div class="sc-types" style="margin-top:3px;">${tBadges}</div></div>
          <span class="sc-badge ${bc}">${bt}</span>
        </div>
        ${movesHtml}${extra}
      </div>`;
    });
  }

  // Type chart
  const dc={};TYPES.forEach(at=>{dc[at]=dmult(at,et);});
  const g={4:[],2:[],0:[],.5:[],.25:[]};
  Object.entries(dc).forEach(([t,m])=>{
    if(m>=4)g[4].push(t);else if(m===2)g[2].push(t);
    else if(m===0)g[0].push(t);else if(m<=.25)g[.25].push(t);
    else if(m===.5)g[.5].push(t);
  });
  const sec=(cls,lbl,arr)=>arr.length?`<div class="rcrow"><div class="rch ${cls}">${lbl}</div><div class="rcbody">${arr.map(t=>`<span class="tb t-${t}">${t}</span>`).join('')}</div></div>`:'';
  html+=`<div class="sec-head">📊 TYPE CHART</div>
    ${sec('x4','💥 4× Super Effective',g[4])}
    ${sec('x2','✅ 2× Super Effective',g[2])}
    ${sec('x0','🚫 0× Immune — avoid',g[0])}
    ${sec('xq','⚠️ ¼× Very Resisted',g[.25])}
    ${sec('xh','⚠️ ½× Resisted',g[.5])}`;

  scroll.innerHTML=html;scroll.scrollTop=0;
}

// Shared dropdown renderer
function renderPDrop(id,list,fn){
  const dd=document.getElementById(id);
  if(!list.length){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=list.map(p=>`<div class="prow" onclick="${fn}(${p.n})">
    <span class="pnum">#${String(p.n).padStart(3,'0')}</span>
    <span class="pname">${p.name}</span>
    <span class="pbadges">${p.types.map(t=>`<span class="tb sm t-${t}">${t}</span>`).join('')}</span>
  </div>`).join('');
}

// ═══════════════════════════════
// PARTY PAGE
// ═══════════════════════════════
function renderParty(){
  const g=document.getElementById('party-grid');
  let html='';
  party.forEach((pm,i)=>{
    const tb=pm.types.map(t=>`<span class="tb sm t-${t}">${t}</span>`).join('');
    const mv=pm.moves&&pm.moves.length
      ?pm.moves.map(m=>`<div class="ps-mv">▸ ${m.name}</div>`).join('')
      :`<div class="ps-mv" style="color:var(--text3);font-style:italic;font-size:9px;">no moves set</div>`;
    const lvTxt=pm.level?`<span class="ps-lv">Lv.${pm.level}</span>`:'';
    html+=`<div class="pslot filled" onclick="openModal(${i})">
      <div class="ps-num">#${String(pm.n).padStart(3,'0')}</div>
      <div class="ps-head"><span class="ps-name">${pm.name}</span>${lvTxt}</div>
      <div class="ps-types">${tb}</div>
      <div class="ps-moves">${mv}</div>
    </div>`;
  });
  for(let i=party.length;i<6;i++){
    html+=`<div class="pslot empty-s" onclick="openModal(-1)"><div class="ps-icon">＋</div><div class="ps-add">ADD POKEMON</div></div>`;
  }
  g.innerHTML=html;
  document.getElementById('party-ct').textContent=party.length?`${party.length} / 6 IN PARTY`:'';
  renderCoverage();
}

function renderCoverage(){
  const wrap=document.getElementById('cov-wrap');
  const bar=document.getElementById('cov-bar');
  if(!party.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  const covered=new Set();
  party.forEach(pm=>{
    const atkTypes=[...pm.types,...(pm.moves||[]).map(m=>m.type)];
    TYPES.forEach(def=>{if(atkTypes.some(at=>gm(at,def)>=2))covered.add(def);});
  });
  bar.innerHTML=TYPES.map(t=>`<span class="cdot t-${t}${covered.has(t)?' covered':' gap'}">${t.slice(0,3).toUpperCase()}</span>`).join('');
}

function tc(t){return{Normal:'#6a6a5a',Fire:'#b84018',Water:'#2850c0',Grass:'#3a8820',Electric:'#b89800',Ice:'#488888',Fighting:'#801818',Poison:'#621880',Ground:'#907030',Flying:'#5848c0',Psychic:'#b02050',Bug:'#607210',Rock:'#786820',Ghost:'#402860',Dragon:'#3808d8',Dark:'#382818',Steel:'#686880',Fairy:'#a03860'}[t]||'#888';}

// ═══════════════════════════════
// MODAL (party edit)
// ═══════════════════════════════
function openModal(idx){
  mSlot=idx;
  if(idx>=0&&idx<party.length){const pm=party[idx];mPoke={n:pm.n,name:pm.name,types:pm.types};mMoves=[...pm.moves||[]];mLv=pm.level||'';}
  else{mPoke=null;mMoves=[];mLv='';}
  mTypeFilter=null;mMoveQ='';
  document.getElementById('modal-ttl').textContent=idx>=0&&idx<party.length?'EDIT POKEMON':'ADD POKEMON';
  renderModal();
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');mPoke=null;mMoves=[];}
function oClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

function renderModal(){
  const body=document.getElementById('modal-body');
  let html=`<div class="mlbl">STEP 1 — CHOOSE POKEMON</div>
  <div class="sbox" style="margin-bottom:8px;">
    <input class="si bf" id="ms-in" placeholder="Search Pokémon..." oninput="onMS(this.value)"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" value="${mPoke?mPoke.name:''}">
    <button class="xcl" id="ms-cl" onclick="clearMP()" style="display:${mPoke?'block':'none'}">✕</button>
  </div>
  <div id="ms-drop" class="pdrop" style="display:none;margin:0;border-radius:var(--r);border-top:1.5px solid var(--border2);margin-bottom:8px;"></div>`;

  if(mPoke){
    const tb=mPoke.types.map(t=>`<span class="tb t-${t}">${t}</span>`).join(' ');
    html+=`<div style="background:var(--card2);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;margin-bottom:10px;">
      <div style="font-size:10px;color:var(--text3);margin-bottom:2px;">#${String(mPoke.n).padStart(3,'0')}</div>
      <div style="font-family:var(--fp);font-size:8.5px;color:var(--gold);margin-bottom:5px;">${mPoke.name}</div>
      <div>${tb}</div>
    </div>
    <div style="margin-bottom:2px;">
      <div class="field-lbl">LEVEL (OPTIONAL)</div>
      <input class="field-in" id="f-lv" type="number" min="1" max="100" placeholder="—" value="${mLv}" oninput="mLv=this.value" style="width:90px;">
    </div>`;
  }

  html+=`<div class="mlbl" style="margin-top:12px;">STEP 2 — MOVES (OPTIONAL, MAX 4)</div>
  <div class="sdots">`;
  for(let i=0;i<4;i++){
    if(i<mMoves.length)html+=`<div class="sdot on t-${mMoves[i].type}"></div>`;
    else html+=`<div class="sdot"></div>`;
  }
  html+=`</div>`;

  mMoves.forEach((mv,i)=>{
    const phys=PHYS.has(mv.type);
    html+=`<div class="pmrow"><span class="tb sm t-${mv.type}">${mv.type}</span><span class="pm-name">${mv.name}</span><span class="pm-stat" style="color:${phys?'#907030':'#5080b8'}">${phys?'PHY':'SPE'}</span><button class="pm-rm" onclick="rmMv(${i})">✕</button></div>`;
  });

  if(mMoves.length<4){
    html+=`<div class="sbox" style="margin-top:10px;margin-bottom:7px;">
      <input class="move-si" id="mv-q" placeholder="Search moves..." oninput="onMQ(this.value)" value="${mMoveQ}"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="tf-row">`;
    TYPES.forEach(t=>{html+=`<div class="tf t-${t}${mTypeFilter===t?' active':''}" onclick="setMTF('${t}')">${t}</div>`;});
    html+=`</div>`;
    const q=mMoveQ.toLowerCase();
    const picked=ALL_MOVES.filter(mv=>mMoves.some(m=>m.name===mv.name)&&(!mTypeFilter||mv.type===mTypeFilter)&&(!q||mv.name.toLowerCase().includes(q)));
    const rest=ALL_MOVES.filter(mv=>!mMoves.some(m=>m.name===mv.name)&&(!mTypeFilter||mv.type===mTypeFilter)&&(!q||mv.name.toLowerCase().includes(q)));
    const display=[...picked,...rest].slice(0,50);
    html+=`<div class="move-results">`;
    if(!display.length)html+=`<div class="no-moves">No moves found</div>`;
    else display.forEach(mv=>{
      const ip=mMoves.some(m=>m.name===mv.name);
      const cc=mv.cat==='phy'?'mres-phy':mv.cat==='spe'?'mres-spe':'mres-sta';
      const cl=mv.cat==='phy'?'PHY':mv.cat==='spe'?'SPE':'STA';
      html+=`<div class="mres-row${ip?' picked':''}" onclick="togMv('${mv.name}','${mv.type}')">
        <span class="tb sm t-${mv.type}">${mv.type}</span>
        <span class="mres-name">${mv.name}</span>
        <span class="mres-tags"><span class="mres-cat ${cc}">${cl}</span>${ip?'<span class="mres-chk">✓</span>':''}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<button class="save-btn" onclick="saveMod()" ${mPoke?'':'disabled'}>${mSlot>=0&&mSlot<party.length?'💾 SAVE CHANGES':'➕ ADD TO PARTY'}</button>`;
  if(mSlot>=0&&mSlot<party.length)html+=`<button class="rm-btn" onclick="rmParty(${mSlot})">✕ REMOVE FROM PARTY</button>`;

  const sp=body.scrollTop;body.innerHTML=html;body.scrollTop=sp;
  if(mMoveQ){const q=document.getElementById('mv-q');if(q){q.focus();q.setSelectionRange(mMoveQ.length,mMoveQ.length);}}
}

function onMS(v){const dd=document.getElementById('ms-drop');document.getElementById('ms-cl').style.display=v?'block':'none';if(!v.trim()){dd.style.display='none';return;}const list=POKEMON.filter(p=>p.name.toLowerCase().includes(v.toLowerCase())).slice(0,8);if(!list.length){dd.style.display='none';return;}dd.style.display='block';dd.innerHTML=list.map(p=>`<div class="prow" onclick="pickMP(${p.n})"><span class="pnum">#${String(p.n).padStart(3,'0')}</span><span class="pname">${p.name}</span><span class="pbadges">${p.types.map(t=>`<span class="tb sm t-${t}">${t}</span>`).join('')}</span></div>`).join('');}
function pickMP(n){mPoke=POKEMON.find(p=>p.n===n);mMoves=[];document.getElementById('ms-drop').style.display='none';renderModal();document.getElementById('ms-in').value=mPoke.name;}
function clearMP(){mPoke=null;mMoves=[];mLv='';renderModal();}
function onMQ(v){mMoveQ=v;const sp=document.getElementById('modal-body').scrollTop;renderModal();document.getElementById('modal-body').scrollTop=sp;const q=document.getElementById('mv-q');if(q){q.focus();q.setSelectionRange(v.length,v.length);}}
function setMTF(t){mTypeFilter=mTypeFilter===t?null:t;mMoveQ='';const sp=document.getElementById('modal-body').scrollTop;renderModal();document.getElementById('modal-body').scrollTop=sp;}
function togMv(name,type){const idx=mMoves.findIndex(m=>m.name===name);if(idx>=0)mMoves.splice(idx,1);else{if(mMoves.length>=4)return;mMoves.push({name,type});}const sp=document.getElementById('modal-body').scrollTop;renderModal();document.getElementById('modal-body').scrollTop=sp;const q=document.getElementById('mv-q');if(q&&mMoveQ){q.focus();q.value=mMoveQ;q.setSelectionRange(mMoveQ.length,mMoveQ.length);}}
function rmMv(i){mMoves.splice(i,1);const sp=document.getElementById('modal-body').scrollTop;renderModal();document.getElementById('modal-body').scrollTop=sp;}
function saveMod(){
  if(!mPoke)return;
  const lv=document.getElementById('f-lv');
  const entry={n:mPoke.n,name:mPoke.name,types:mPoke.types,moves:[...mMoves],level:lv?lv.value:''};
  if(mSlot>=0&&mSlot<party.length)party[mSlot]=entry;
  else{if(party.length>=6)return;party.push(entry);}
  saveParty();closeModal();renderParty();
  if(activePoke)renderPokeDetail();
}
function rmParty(i){party.splice(i,1);saveParty();closeModal();renderParty();if(activePoke)renderPokeDetail();}

// ═══════════════════════════════
// GYMS PAGE
// ═══════════════════════════════
function renderGyms(){
  document.getElementById('gyms-scroll').innerHTML=BOSSES.map((boss,i)=>`
    <div class="gym-card" id="gc-${i}">
      <div class="gym-hd" onclick="document.getElementById('gc-${i}').classList.toggle('open')">
        <div class="gym-icon" style="background:${boss.color}22;border-color:${boss.color}44;">${boss.icon}</div>
        <div class="gym-info"><div class="gym-name">${boss.name}</div><div class="gym-sub">${boss.sub}</div></div>
        <div class="gym-arr">▾</div>
      </div>
      <div class="gym-body">
        <div class="gym-team">${boss.team.map(p=>`<div class="gym-poke" onclick="goSearch('${p.name}')">
          <span class="gym-poke-lv">Lv.${p.lv}</span>
          <span class="gym-poke-name">${p.name}</span>
          <span class="pbadges">${p.types.map(t=>`<span class="tb sm t-${t}">${t}</span>`).join('')}</span>
        </div>`).join('')}</div>
        <div class="gym-tip">💡 ${boss.tip}</div>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════
// WHERE AM I PAGE
// ═══════════════════════════════
function filterLocs(v){
  const q=v.toLowerCase().trim();
  const list=q?LOCATIONS.filter(l=>l.name.toLowerCase().includes(q)||l.methods.some(m=>m.p.some(p=>p.toLowerCase().includes(q)))):LOCATIONS;
  renderLocs(list,!!q);
}
function renderLocs(list,autoOpen=false){
  const s=document.getElementById('loc-scroll');
  if(!list.length){s.innerHTML=`<div class="empty"><div class="ei">🗺️</div><p>NO RESULTS</p></div>`;return;}
  s.innerHTML=list.map((loc,i)=>`
    <div class="loc-card${autoOpen?' open':''}" id="lc-${i}">
      <div class="lch" onclick="this.parentElement.classList.toggle('open')">
        <div class="lcn">${loc.name}</div><div class="lcx">▾</div>
      </div>
      <div class="lcm">
        ${loc.methods.map(m=>`<div class="lml">${m.label}</div><div class="lplist">${m.p.map(n=>`<span class="lpchip" onclick="goSearch('${n}')">${n}</span>`).join('')}</div>`).join('')}
      </div>
    </div>`).join('');
}

// Navigate to search and look up a pokemon
function goSearch(name){
  const p=POKEMON.find(x=>x.name===name);if(!p)return;
  showPage('search');
  activePoke=p;activeTypeFilter=null;
  buildTypePills();
  document.getElementById('s-in').value=p.name;
  document.getElementById('s-cl').style.display='block';
  document.getElementById('s-drop').style.display='none';
  addRecent(p);renderPokeDetail();
}

// ── INIT
buildTypePills();
renderSearchDefault();
renderLocs(LOCATIONS);
renderGyms();
renderParty();
</script>
