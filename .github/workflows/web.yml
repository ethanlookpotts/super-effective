name: Web CI

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

defaults:
  run:
    working-directory: web

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Biome check
        run: npm run lint -- --reporter=github
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-dist
          path: web/dist
          retention-days: 7
